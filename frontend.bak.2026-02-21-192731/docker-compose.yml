
version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: motogestor-db
    restart: always
    environment:
      POSTGRES_USER: motouser
      POSTGRES_PASSWORD: motopass
      POSTGRES_DB: motogestor
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - motogestor_net

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: motogestor-api
    restart: always
    environment:
      DATABASE_URL: postgresql://motouser:motopass@postgres:5432/motogestor
      JWT_SECRET: supersecret_change_in_production
      NODE_ENV: production
      PORT: 4000
    depends_on:
      - postgres
    networks:
      - motogestor_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: motogestor-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - motogestor_net

networks:
  motogestor_net:
    driver: bridge

volumes:
  pgdata:
